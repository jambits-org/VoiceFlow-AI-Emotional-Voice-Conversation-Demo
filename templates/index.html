<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceFlow AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-[#0a0a0f] text-white min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Ambient background -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-blue-600/8 rounded-full blur-3xl"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4"></div>

  <!-- OTP Screen -->
  <div id="otp-screen" class="relative z-10 w-full max-w-sm mx-auto px-6">
    <div class="text-center mb-10">
      <div class="w-16 h-16 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight">VoiceFlow AI</h1>
      <p class="text-white/40 text-sm mt-2">Emotional voice conversations</p>
    </div>
    <div class="glass rounded-2xl p-6 glow">
      <label class="text-xs text-white/50 uppercase tracking-wider mb-2 block">Access Code</label>
      <input id="otp-input" type="text" maxlength="6" placeholder="Enter code"
        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center text-lg tracking-[0.3em] focus:outline-none focus:border-violet-500/50 transition placeholder:text-white/20" />
      <button onclick="verifyOTP()" id="otp-btn"
        class="w-full mt-4 bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 rounded-xl py-3 text-sm font-medium transition-all duration-300">
        Continue
      </button>
      <p id="otp-error" class="text-red-400/80 text-xs text-center mt-3 hidden"></p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="relative z-10 w-full max-w-lg mx-auto px-4 h-screen flex flex-col py-6 hidden">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
        </div>
        <div>
          <h2 class="text-sm font-semibold">VoiceFlow AI</h2>
          <p class="text-[10px] text-white/30">Emotional voice assistant</p>
        </div>
      </div>
      <div id="attempts-badge" class="glass rounded-full px-3 py-1 text-[10px] text-white/50">
        <span id="attempts-count">10</span> left
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto space-y-3 pr-1 pb-4">
      <div class="fade-in flex justify-start">
        <div class="glass rounded-2xl rounded-tl-md px-4 py-3 max-w-[85%]">
          <p class="text-sm text-white/70">Hey there... I'm really glad you're here. Just tap the mic to talk to me. I'm all ears.</p>
        </div>
      </div>
    </div>

    <!-- Mic area -->
    <div class="flex-shrink-0 flex flex-col items-center gap-3 pt-2">
      <!-- Recording wave bars -->
      <div id="wave-container" class="flex items-center gap-1 h-8 hidden">
        <div class="w-1 bg-red-400 rounded-full recording-wave" style="animation-delay:0s"></div>
        <div class="w-1 bg-red-400 rounded-full recording-wave" style="animation-delay:0.15s"></div>
        <div class="w-1 bg-red-400 rounded-full recording-wave" style="animation-delay:0.3s"></div>
        <div class="w-1 bg-red-400 rounded-full recording-wave" style="animation-delay:0.45s"></div>
        <div class="w-1 bg-red-400 rounded-full recording-wave" style="animation-delay:0.6s"></div>
      </div>

      <!-- Mic button -->
      <button id="mic-btn" onclick="toggleRecording()"
        class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 flex items-center justify-center transition-all duration-300 shadow-lg shadow-violet-500/20 active:scale-95 relative">
        <!-- Mic icon -->
        <svg id="mic-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
        </svg>
        <!-- Stop icon (square) -->
        <svg id="stop-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
        <!-- Spinner -->
        <svg id="spinner" class="w-6 h-6 animate-spin hidden" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>

      <p id="mic-hint" class="text-[10px] text-white/25">Tap to speak</p>
    </div>
  </div>

  <!-- Branding footer -->
  <div class="fixed bottom-4 left-0 right-0 z-40 text-center space-y-0.5">
    <p class="text-white/25 text-[11px]">Powered by <a href="https://jambits.io" target="_blank" class="text-violet-400/60 hover:text-violet-400 transition">jambits.io</a></p>
    <p class="text-white/20 text-[11px]">
      <a href="mailto:connect@jambits.io" class="hover:text-white/40 transition">connect@jambits.io</a>
      <span class="mx-1">·</span>
      <a href="tel:+14378290485" class="hover:text-white/40 transition">+1 (437) 829-0485</a>
    </p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
